<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enterprise IAM Demo App</title>
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <div class="container">

    <header>
      <h1>Enterprise IAM Demo App</h1>
      <p>Okta SSO • MFA • RBAC • JWT Validation</p>
    </header>

    <!-- LOGIN -->
    <section class="login-card">
      <h2>Login Simulation</h2>
      <button onclick="login()">Login with Okta</button>
    </section>

    <!-- APP -->
    <section id="appContent" class="hidden">

      <h2 id="welcomeText"></h2>

      <!-- ROLE BADGE -->
      <div id="roleBadge" class="role-badge"></div>

      <!-- USER INFO -->
      <div class="identity-card">
        <p id="userInfo"></p>
        <p id="groupInfo"></p>
      </div>

      <!-- FEATURES -->
      <div class="cards">
        <div class="card">
          <h3>Dashboard</h3>
        </div>

        <div class="card hidden" id="engineering">
          <h3>Engineering Tools</h3>
        </div>

        <div class="card hidden" id="admin">
          <h3>Admin Panel</h3>
          <button onclick="callAdminAPI()">Run Admin Action</button>
        </div>
      </div>

      <!-- AUTH RESULT -->
      <div class="api-card">
        <h3>Authorization Status</h3>
        <p id="apiAccessText"></p>
      </div>

      <!-- 🔥 API TESTING PANEL -->
      <div class="api-card">
        <h3>Backend API Testing</h3>

        <div class="api-buttons">
          <button onclick="callVerify()">Verify Token</button>
          <button onclick="callSales()">Sales API</button>
          <button onclick="callEngineering()">Engineering API</button>
          <button onclick="callAdminData()">Admin API</button>
        </div>

        <pre id="apiResponseBox">Click a button to test APIs...</pre>
      </div>

      <button class="logout" onclick="logout()">Logout</button>

    </section>

  </div>

  <script src="script.js?v=7"></script>
</body>
</html>
